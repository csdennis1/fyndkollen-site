<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Fyndkollen Admin</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#CC6B2C">
<link rel="apple-touch-icon" href="/icon128.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>(function(){try{if(localStorage.getItem('fk_admin_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.bunny.net">
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800">
<style>
:root{--bg:#F7F4EF;--surface:#EFEAE1;--card:#FFF;--border:#E6DFD4;--text:#1A1611;--mid:#6B5F4E;--muted:#A2937E;--accent:#CC6B2C;--green:#0E9F6E;--red:#DC2626;--amber:#D97706}
:root[data-theme=dark]{--bg:#161310;--surface:#211C17;--card:#221D18;--border:#322B23;--text:#F1ECE4;--mid:#C9BDAC;--muted:#8C8070;--accent:#E07E3C;--green:#34D399;--red:#F87171;--amber:#FBBF24}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
.bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:13px 22px;background:var(--card);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:13px}
.brand svg{color:var(--accent)}
.tag{font-size:10.5px;font-weight:700;color:var(--mid);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2px 8px}
.tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.chip{font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--mid);cursor:pointer;font-family:inherit}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.wrap{max-width:1180px;margin:0 auto;padding:20px 22px 70px}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:17px}
.k-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.k-val{font-size:25px;font-weight:800;letter-spacing:-.02em;margin-top:5px;font-variant-numeric:tabular-nums}
.k-sub{font-size:12px;color:var(--mid);margin-top:3px}
.delta{font-size:12px;font-weight:700;margin-left:7px}
h2{font-size:12px;font-weight:700;margin:0 0 12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sec-h{font-size:15px;font-weight:800;margin:28px 0 12px;letter-spacing:-.01em}
.row{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:7px 6px;border-bottom:1px solid var(--border)}
td{padding:9px 6px;border-bottom:1px solid var(--surface);font-variant-numeric:tabular-nums;vertical-align:top}
tr:last-child td{border-bottom:none}
.track{height:8px;background:var(--surface);border-radius:5px;overflow:hidden;margin-top:6px}
.fill{height:100%;border-radius:5px;transition:width .3s}
.pill{font-size:11px;font-weight:700;border-radius:6px;padding:2px 9px;display:inline-block}
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:9px 15px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:.12s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}.btn.pri:hover{color:#fff;filter:brightness(.95)}
.btn.danger{color:var(--red);border-color:rgba(220,38,38,.3)}.btn.danger:hover{border-color:var(--red);color:var(--red)}
input{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);outline:none;width:100%}
input:focus{border-color:var(--accent)}
svg.chart{width:100%;height:104px;display:block}
#login{max-width:320px;margin:16vh auto;text-align:center}
#login .card{padding:26px 24px}#login input{margin:16px 0}
.muted{color:var(--muted)}.mid{color:var(--mid)}
.warn{background:rgba(217,119,6,.09);border:1px solid rgba(217,119,6,.3);border-radius:12px;padding:13px 16px;font-size:13.5px;color:var(--amber);margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
.ok-note{color:var(--green);font-size:12.5px;margin-bottom:16px}
.mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px}
.fb-msg{font-size:12.5px;color:var(--mid);white-space:pre-wrap;word-break:break-word}
/* ── Smart schema ── */
.sched-add{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:18px}
.sched-add input,.sched-add select{background:var(--card);width:auto}
.sched-add .sc-title{flex:1 1 180px;min-width:150px}
.sched-add select{font-family:inherit;font-size:13px;padding:9px 10px;border:1px solid var(--border);border-radius:9px;color:var(--text);cursor:pointer}
.sched-add .crit-lbl{font-size:12px;color:var(--mid);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;white-space:nowrap}
.sched-add .crit-lbl input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.day-h{display:flex;align-items:baseline;gap:9px;margin:20px 0 9px;padding-bottom:7px;border-bottom:1.5px solid var(--border)}
.day-h:first-of-type{margin-top:2px}
.day-h .d-main{font-size:14px;font-weight:800;letter-spacing:-.01em}
.day-h .d-sub{font-size:11.5px;color:var(--muted);font-weight:600}
.day-h.today .d-main{color:var(--accent)}
.day-h.overdue .d-main{color:var(--red)}
.si{display:flex;gap:12px;align-items:stretch;padding:11px 13px;border-radius:12px;border:1px solid var(--border);background:var(--card);margin-bottom:8px;transition:border-color .12s,box-shadow .12s}
.si:hover{border-color:var(--muted);box-shadow:0 1px 5px rgba(0,0,0,.04)}
.si.prop{background:rgba(204,107,44,.05);border-color:rgba(204,107,44,.32)}
.si.done{opacity:.6}
.si-stripe{width:3px;border-radius:3px;flex-shrink:0}
.si-body{flex:1;min-width:0}
.si-title{font-size:13.5px;font-weight:600;line-height:1.35;word-break:break-word}
.si.done .si-title{text-decoration:line-through;color:var(--muted)}
.si-note{font-size:11.5px;color:var(--accent);margin-top:3px;line-height:1.45}
.si-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px}
.si-badge{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.si-det{margin-top:6px}
.si-det summary{font-size:11px;color:var(--muted);cursor:pointer;font-weight:600}
.si-det p{font-size:12px;color:var(--mid);line-height:1.55;margin-top:5px}
.si-acts{display:flex;gap:5px;flex-shrink:0;align-items:flex-start}
.si-btn{width:31px;height:31px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--mid);cursor:pointer;font-size:14px;transition:.12s;padding:0}
.si-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--card)}
.si-btn.ok:hover{border-color:var(--green);color:var(--green)}
.si-btn.no:hover{border-color:var(--red);color:var(--red)}
.sched-empty{text-align:center;padding:26px 16px;color:var(--muted);font-size:13px}
@media(max-width:640px){.wrap{padding:16px 14px 60px}.bar{padding:12px 14px}.k-val{font-size:22px}.si-acts{flex-direction:column}
  input,select{font-size:16px} /* under 16px auto-zoomar iOS Safari in vid fokus */
  .si-btn{width:38px;height:38px;font-size:16px} /* större touch-ytor */
  .sched-add .sc-title{flex-basis:100%}}
/* ── Life Admin Panel: skal (2026-07-20, phone-first 390px) ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;background:var(--card);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{flex:1;background:none;border:none;font-family:inherit;padding:9px 0 7px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabbar button .ti{font-size:19px;line-height:1}
.tabbar button.on{color:var(--accent)}
.tabwrap{padding-bottom:78px}
@media(min-width:900px){
  .tabbar{top:58px;bottom:auto;right:auto;width:184px;flex-direction:column;height:calc(100vh - 58px);border-top:none;border-right:1px solid var(--border);padding:16px 0;justify-content:flex-start}
  .tabbar button{flex:0 0 auto;flex-direction:row;gap:11px;justify-content:flex-start;padding:12px 24px;font-size:13.5px}
  .tabwrap{margin-left:184px;padding-bottom:30px}
}
/* moduler */
.ov-hi{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px}
.ov-date{font-size:13px;color:var(--muted);margin-bottom:16px}
.ov-grid{display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-bottom:20px}
.proj{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:13px 15px;border:1px solid var(--border);border-radius:13px;background:var(--card);margin-bottom:9px}
.proj .p-name{font-size:14.5px;font-weight:800}
.proj .p-line{font-size:12.5px;color:var(--mid);margin-top:2px}
.proj .p-next{font-size:12.5px;margin-top:6px}.proj .p-next b{color:var(--accent)}
.proj .p-upd{font-size:10.5px;color:var(--muted);margin-top:5px}
/* money (kassaboken, portad till panelens tema) */
.m-hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.m-hero .h-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.m-hero .h-num{font-size:clamp(34px,9vw,52px);font-weight:800;letter-spacing:-.02em;line-height:1.1;margin:4px 0 2px;font-variant-numeric:tabular-nums}
.m-hero .h-num.pos{color:var(--green)}.m-hero .h-num.neg{color:var(--red)}
.m-hero .h-note{font-size:12.5px;color:var(--mid)}
.m-bar{display:flex;height:9px;border-radius:6px;overflow:hidden;margin-top:14px;background:var(--surface)}
.m-bar span{height:100%;transition:width .3s}
.m-leg{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.m-leg i{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:5px}
.m-group{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-top:11px;overflow:hidden}
.m-gh{display:flex;justify-content:space-between;align-items:baseline;padding:13px 16px 10px;border-bottom:1px solid var(--border)}
.m-gt{font-size:14px;font-weight:700}.m-gs{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}.m-gs.inc{color:var(--green)}
.m-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 16px;border-bottom:1px solid var(--surface)}
.m-row:last-child{border-bottom:none}
.m-lbl{font-size:13.5px;min-width:0}.m-hint{display:block;font-size:10.5px;color:var(--muted);margin-top:1px}
.m-in{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 8px;flex-shrink:0}
.m-in input{width:72px;text-align:right;background:none;border:none;padding:2px;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums}
.m-in .u{font-size:11px;color:var(--muted);margin-left:4px}
.m-add{display:block;width:100%;text-align:left;background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--accent);padding:10px 16px;cursor:pointer}
.m-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px}.m-del:hover{color:var(--red)}
.m-months{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
.m-months b{font-size:15px;font-variant-numeric:tabular-nums}
/* skills */
.sk{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 16px;margin-bottom:11px}
.sk-h{display:flex;justify-content:space-between;align-items:center;gap:8px}
.sk-name{font-size:15.5px;font-weight:800}
.sk-streak{font-size:12px;font-weight:700;color:var(--amber);white-space:nowrap}
.sk-week{margin:10px 0 6px;width:100%;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);font-family:inherit;font-size:13.5px;font-weight:700;color:var(--mid);cursor:pointer}
.sk-week.on{background:rgba(14,159,110,.12);border-color:var(--green);color:var(--green)}
.ms{display:flex;align-items:center;gap:10px;padding:7px 2px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.ms .box{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.ms.done .box{background:var(--green);border-color:var(--green)}
.ms .t{font-size:13.5px}.ms.done .t{text-decoration:line-through;color:var(--muted)}
/* content */
.c-form{display:grid;gap:8px;grid-template-columns:1fr 1fr;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:11px;margin-bottom:14px}
.c-form .full{grid-column:1/-1}
.c-post{padding:10px 2px;border-top:1px solid var(--surface);font-size:13px}
.c-post .cp-top{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.c-post .cp-meta{color:var(--muted);font-size:11.5px;margin-top:2px}
.plat-pill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;background:var(--surface);color:var(--mid)}
.fo-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--surface)}
.fo-row .fo-name{font-size:13px;font-weight:700;width:64px}
.fo-row input{width:84px}
.fo-row svg{flex:1;height:30px}
.idea{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:8px 2px;border-top:1px solid var(--surface);font-size:13.5px}
</style>
</head>
<body>
<div id="login">
  <div class="card">
    <div class="brand" style="justify-content:center;margin-bottom:4px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z" fill="currentColor"/></svg>
      Fyndkollen Admin
    </div>
    <input id="pw" type="password" placeholder="Lösenord" autofocus>
    <button class="btn pri" style="width:100%" onclick="login()">Logga in</button>
    <div id="lerr" class="muted" style="font-size:12px;margin-top:10px"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="bar">
    <div class="brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z" fill="currentColor"/></svg>
      Fyndkollen <span class="tag">Admin</span>
    </div>
    <div class="tools">
      <span id="fk-chips" style="display:none">
        <button class="chip" id="c-today" onclick="setP('today')">Idag</button>
        <button class="chip on" id="c-7d" onclick="setP('7d')">7 dagar</button>
        <button class="chip" id="c-30d" onclick="setP('30d')">30 dagar</button>
      </span>
      <button class="chip" onclick="toggleTheme()" title="Tema" style="padding:6px 10px">◐</button>
      <button class="chip" onclick="load();lifeLoad()">↻</button>
    </div>
  </div>
  <div class="tabwrap">
    <div class="tabpane" id="tab-overview"><div class="wrap" id="ov-body"></div></div>
    <div class="tabpane" id="tab-fk" style="display:none"><div class="wrap" id="body"></div></div>
    <div class="tabpane" id="tab-money" style="display:none"><div class="wrap" id="money-body"></div></div>
    <div class="tabpane" id="tab-skills" style="display:none"><div class="wrap" id="skills-body"></div></div>
    <div class="tabpane" id="tab-content" style="display:none"><div class="wrap" id="content-body"></div></div>
  </div>
  <nav class="tabbar">
    <button id="tb-overview" class="on" onclick="setTab('overview')"><span class="ti">🏠</span>Översikt</button>
    <button id="tb-fk" onclick="setTab('fk')"><span class="ti">🏷️</span>Fyndkollen</button>
    <button id="tb-money" onclick="setTab('money')"><span class="ti">💰</span>Money</button>
    <button id="tb-skills" onclick="setTab('skills')"><span class="ti">🧗</span>Skills</button>
    <button id="tb-content" onclick="setTab('content')"><span class="ti">📣</span>Content</button>
  </nav>
</div>

<script>
var API="https://bixsxcyvrvyokeutauyz.supabase.co/functions/v1/admin";
var PW="", PERIOD="7d", TIMER=null;
async function call(action, extra){
  var r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({password:PW,action:action},extra||{}))});
  return {status:r.status, body:await r.json().catch(function(){return{};})};
}
async function login(){
  PW=document.getElementById("pw").value;
  var r=await call("data",{period:PERIOD});
  if(r.status===200){document.getElementById("login").style.display="none";document.getElementById("app").style.display="block";render(r.body.stats,r.body.scrape_fail_today,r.body.client_error_today,r.body.forst50,r.body.turnstile,r.body.web_pv_today,r.body.web_appr_today);startAuto();lifeLoad();setTab('overview');}
  else{document.getElementById("lerr").textContent="Fel lösenord.";}
}
async function load(){var r=await call("data",{period:PERIOD});if(r.status===200)render(r.body.stats,r.body.scrape_fail_today,r.body.client_error_today,r.body.forst50,r.body.turnstile,r.body.web_pv_today,r.body.web_appr_today);}
function setP(p){PERIOD=p;["today","7d","30d"].forEach(function(x){document.getElementById("c-"+x).classList.toggle("on",x===p);});load();}
function startAuto(){if(TIMER)clearInterval(TIMER);TIMER=setInterval(load,30000);}
function toggleTheme(){var d=document.documentElement.getAttribute("data-theme")==="dark";if(d){document.documentElement.removeAttribute("data-theme");}else{document.documentElement.setAttribute("data-theme","dark");}try{localStorage.setItem("fk_admin_theme",d?"light":"dark");}catch(e){}}
function kr(ore){return (Number(ore||0)/100).toLocaleString("sv-SE")+" kr";}
function n(x){return Number(x||0).toLocaleString("sv-SE");}
function pct(a,b){return b?Math.min(100,Math.round(a/b*100)):0;}
function barColor(p){return p>=85?"var(--red)":p>=60?"var(--amber)":"var(--green)";}
function delta(now,prev){now=Number(now||0);prev=Number(prev||0);if(prev===0)return now>0?'<span class="delta" style="color:var(--green)">ny</span>':'';var p=Math.round((now-prev)/prev*100);var c=p>=0?"var(--green)":"var(--red)";return '<span class="delta" style="color:'+c+'">'+(p>=0?"▲":"▼")+Math.abs(p)+'%</span>';}
function kpi(l,v,sub){return '<div class="card"><div class="k-lbl">'+l+'</div><div class="k-val">'+v+'</div><div class="k-sub">'+sub+'</div></div>';}
function spark(arr,key){
  if(!arr||!arr.length)return '<div class="muted" style="font-size:12px">Ingen data än.</div>';
  var W=600,H=104,vals=arr.map(function(d){return Number(d[key]||0);}),max=Math.max.apply(null,vals)*1.15||1;
  var pts=vals.map(function(v,i){var x=arr.length>1?i/(arr.length-1)*W:0;var y=H-4-(v/max)*(H-10);return x.toFixed(1)+","+y.toFixed(1);});
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><path d="M0,'+H+' L'+pts.join(" L")+' L'+W+','+H+' Z" fill="rgba(204,107,44,.09)"/><polyline points="'+pts.join(" ")+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>';
}
function plabel(){return PERIOD==="today"?"idag":PERIOD==="30d"?"30 d":"7 d";}

  if(!total){el.innerHTML='<span class="muted">Inga steg inlagda än.</span>';return;}
  if(!pend.length){el.innerHTML='<b>🎉 Alla '+total+' steg avklarade.</b> <span class="muted">Be agenten fylla på nästa fas.</span>';return;}
  var cur=pend[0], p=Math.round(done.length/total*100), h='';

// ── 📅 Smart schema ── AI föreslår tider (schedule_suggest, Haiku ~ören/klick); dina
// flyttar/avvisningar MED MOTIVERING loggas i schedule_feedback och matas in i nästa
// förslagsomgång — det är så den lär känna dig. Kritiska deadlines mejlas 7d+1d före (cron).
var SCHED=[];
var KINDLBL={task:"Uppgift",deadline:"Deadline",routine:"Rutin",private:"Privat"};
async function loadSchedule(){
  var el=document.getElementById("sched-body"); if(!el) return;
  var r=await call("schedule_list");
  if(r.status!==200){el.innerHTML='<span class="muted">Kunde inte ladda schemat.</span>';return;}
  SCHED=r.body.items||[]; renderSchedule();
}
// Färg per typ (kant-streck + badge) — snabb visuell kod: deadline=bärnsten, rutin=grön,
// privat=blå, uppgift=neutral; förslag=accent; försenat=rött (vinner över allt).
var KINDCOL={deadline:"var(--amber)",routine:"var(--green)",private:"#3B82F6",task:"var(--muted)"};
var WD=["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"];
var MON=["jan","feb","mars","apr","maj","juni","juli","aug","sep","okt","nov","dec"];
function fmtDate(d){var t=new Date(d+"T12:00:00");return t.getDate()+" "+MON[t.getMonth()];}
function dayHead(d,today){
  var dt=new Date(d+"T12:00:00"),t=new Date(today+"T12:00:00");
  var diff=Math.round((dt-t)/86400000),wd=WD[dt.getDay()],pretty=wd.charAt(0).toUpperCase()+wd.slice(1)+" "+fmtDate(d);
  if(diff===0)return {main:"Idag",sub:pretty,cls:"today"};
  if(diff===1)return {main:"Imorgon",sub:pretty,cls:""};
  if(diff<=6)return {main:"Om "+diff+" dagar",sub:pretty,cls:""};
  return {main:pretty,sub:"om "+diff+" dagar",cls:""};
}
function schedRow(it,today){
  var overdue=it.due_date&&it.due_date<today&&it.status==="pending";
  var done=it.status!=="pending";
  var stripe=done?"var(--border)":it.proposed?"var(--accent)":overdue?"var(--red)":(KINDCOL[it.kind]||"var(--muted)");
  var h='<div class="si'+(it.proposed?" prop":"")+(done?" done":"")+'">';
  h+='<div class="si-stripe" style="background:'+stripe+'"></div>';
  h+='<div class="si-body">';
  h+='<div class="si-title">'+escT(it.title)+'</div>';
  if(it.ai_note&&it.proposed)h+='<div class="si-note">🤖 '+escT(it.ai_note)+'</div>';
  // Badges
  var b='';
  if(it.proposed)b+='<span class="si-badge" style="background:rgba(204,107,44,.16);color:var(--accent)">🤖 Förslag</span>';
  if(it.critical)b+='<span class="si-badge" style="background:rgba(220,38,38,.13);color:var(--red)">Kritisk</span>';
  if(it.kind&&it.kind!=="task")b+='<span class="si-badge" style="background:var(--surface);color:var(--mid)">'+(KINDLBL[it.kind]||it.kind)+'</span>';
  if(it.recurrence)b+='<span class="si-badge" style="background:var(--surface);color:var(--mid)">↻ '+(it.recurrence==="monthly"?"Månad":"Vecka")+'</span>';
  if(overdue)b+='<span class="si-badge" style="background:rgba(220,38,38,.13);color:var(--red)">Förföll '+fmtDate(it.due_date)+'</span>';
  if(b)h+='<div class="si-meta">'+b+'</div>';
  if(it.detail)h+='<details class="si-det"><summary>Visa detaljer</summary><p>'+escT(it.detail)+'</p></details>';
  h+='</div>';
  // Actions
  h+='<div class="si-acts">';
  if(it.status==="pending"){
    if(it.proposed){
      h+='<button class="si-btn ok" title="Acceptera förslaget" onclick="schedAccept('+it.id+')">✓</button>';
      h+='<button class="si-btn" title="Flytta till annat datum" onclick="schedMove('+it.id+')">📅</button>';
      h+='<button class="si-btn no" title="Avvisa förslaget" onclick="schedReject('+it.id+')">✕</button>';
    } else {
      h+='<button class="si-btn ok" title="Markera som klar" onclick="schedDone('+it.id+')">✓</button>';
      h+='<button class="si-btn" title="Flytta datum" onclick="schedMove('+it.id+')">📅</button>';
      h+='<button class="si-btn no" title="Ta bort" onclick="schedSkip('+it.id+')">✕</button>';
    }
  }
  h+='</div></div>';
  return h;
}
function renderSchedule(){
  var el=document.getElementById("sched-body"); if(!el) return;
  var today=new Date().toISOString().slice(0,10);
  var pend=SCHED.filter(function(i){return i.status==="pending";});
  var overdue=pend.filter(function(i){return i.due_date&&i.due_date<today;});
  var dated=pend.filter(function(i){return i.due_date&&i.due_date>=today;});
  var undated=pend.filter(function(i){return !i.due_date;});
  var doneRecent=SCHED.filter(function(i){return i.status==="done";});
  var props=pend.filter(function(i){return i.proposed;}).length;
  var h='';
  // Snabbtillägg
  h+='<div class="sched-add">';
  h+='<input id="sc-title" class="sc-title" placeholder="Lägg till en uppgift…">';
  h+='<input id="sc-date" type="date" title="Datum (valfritt)">';
  h+='<select id="sc-kind"><option value="task">Uppgift</option><option value="deadline">Deadline</option><option value="routine">Rutin</option><option value="private">Privat</option></select>';
  h+='<label class="crit-lbl"><input id="sc-crit" type="checkbox"> kritisk (mejlas)</label>';
  h+='<button class="btn pri" onclick="schedAdd()">Lägg till</button>';
  h+='<button class="btn" id="sc-suggest" onclick="schedSuggest()">🤖 Föreslå</button></div>';
  // Förslags-notis
  if(props)h+='<div class="ok-note" style="color:var(--accent);margin-bottom:14px">🤖 '+props+' AI-förslag väntar på ditt beslut — ✓ acceptera, 📅 flytta eller ✕ avvisa (motivera gärna, så lär den sig).</div>';
  // Försenat (en samlad grupp överst)
  if(overdue.length){
    h+='<div class="day-h overdue"><span class="d-main">⚠ Försenat</span><span class="d-sub">'+overdue.length+' st</span></div>';
    overdue.sort(function(a,b){return a.due_date<b.due_date?-1:1;}).forEach(function(i){h+=schedRow(i,today);});
  }
  // Daterat, grupperat per dag
  if(dated.length){
    var byDate={};dated.forEach(function(i){(byDate[i.due_date]=byDate[i.due_date]||[]).push(i);});
    Object.keys(byDate).sort().slice(0,30).forEach(function(d){
      var dh=dayHead(d,today);
      h+='<div class="day-h '+dh.cls+'"><span class="d-main">'+dh.main+'</span><span class="d-sub">'+dh.sub+'</span></div>';
      byDate[d].forEach(function(i){h+=schedRow(i,today);});
    });
  }
  // Utan datum
  if(undated.length){
    h+='<div class="day-h"><span class="d-main">Utan datum</span><span class="d-sub">'+undated.length+' st · schemaläggs av 🤖</span></div>';
    undated.forEach(function(i){h+=schedRow(i,today);});
  }
  if(!pend.length)h+='<div class="sched-empty">Inget planerat än.<br>Lägg till något ovan eller klicka <b>🤖 Föreslå</b>.</div>';
  if(doneRecent.length)h+='<details style="margin-top:16px"><summary class="muted" style="font-size:12px;cursor:pointer;font-weight:600">Nyligen klara ('+doneRecent.length+')</summary><div style="margin-top:8px">'+doneRecent.map(function(i){return schedRow(i,today);}).join("")+'</div></details>';
  el.innerHTML=h;
}
async function schedAdd(){
  var t=document.getElementById("sc-title").value.trim(); if(!t){alert("Skriv en titel.");return;}
  var r=await call("schedule_add",{title:t,due_date:document.getElementById("sc-date").value||null,kind:document.getElementById("sc-kind").value,critical:document.getElementById("sc-crit").checked});

async function schedReject(id){

async function schedSkip(id){

async function schedSuggest(){

    html+='<button class="m-add" onclick="mAdd(\''+g[0]+'\')">+ lägg till</button></div>';
  });
  html+='<div class="k-sub" style="margin-top:12px">Dubbelklicka en post för att byta namn. Allt sparas automatiskt.</div>';
  el.innerHTML=html;
}
function mVal(id,v){
  var it=LIFE.d.budget.find(function(x){return x.id===id;});if(!it)return;
  it.val=parseInt(v)||0;
  clearTimeout(mT[id]);mT[id]=setTimeout(function(){call('life_save',{table:'budget_items',row:{id:id,val:it.val}});},450);
  clearTimeout(mT._r);mT._r=setTimeout(function(){if(document.activeElement&&document.activeElement.tagName==='INPUT')return;renderMoney();renderOverview();},900);
}
async function mRename(id){var it=LIFE.d.budget.find(function(x){return x.id===id;});var nn=prompt('Namn på posten:',it.label);if(nn===null||!nn.trim())return;await call('life_save',{table:'budget_items',row:{id:id,label:nn.trim()}});lifeLoad();}
async function mDel(id){if(!confirm('Ta bort posten?'))return;await call('life_del',{table:'budget_items',id:id});lifeLoad();}
async function mAdd(cat){var nn=prompt('Namn på posten:');if(nn===null||!nn.trim())return;var v=parseInt(prompt('Belopp (kr):','0'))||0;await call('life_save',{table:'budget_items',row:{month:LIFE.month,cat:cat,label:nn.trim(),val:v,sort:99}});lifeLoad();}
function mShift(dir){var p=LIFE.month.split('-');var d=new Date(+p[0],+p[1]-1+dir,1);LIFE.month=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');lifeLoad();}
async function mCopyPrev(){
  var ms=LIFE.d.budget_months.filter(function(m){return m<LIFE.month;}).sort();
  var src=ms[ms.length-1];if(!src){alert('Ingen tidigare månad att kopiera från.');return;}
  var r=await call('life_get',{month:src});if(r.status!==200)return;
  for(var i=0;i<r.body.budget.length;i++){var it=r.body.budget[i];
    await call('life_save',{table:'budget_items',row:{month:LIFE.month,cat:it.cat,label:it.label,hint:it.hint,val:it.val,sort:it.sort}});}
  lifeLoad();
}

// ── Skills (milstolpe-stegar + veckostreaks — noll daglig loggning) ──
function skStreak(id){
  var set={};LIFE.d.weeks.forEach(function(w){if(w.skill_id===id)set[w.week]=1;});
  var cur=mondayOf(new Date()),n2=0;
  if(!set[cur]){var t=new Date(cur);t.setDate(t.getDate()-7);cur=t.toISOString().slice(0,10);}
  while(set[cur]){n2++;var t2=new Date(cur);t2.setDate(t2.getDate()-7);cur=t2.toISOString().slice(0,10);}
  return n2;
}
function renderSkills(){
  var el=document.getElementById('skills-body');if(!el)return;
  if(!LIFE.d){el.innerHTML='<span class="muted">Laddar…</span>';return;}
  var wk=mondayOf(new Date()),html='';
  LIFE.d.skills.forEach(function(s){
    var on=LIFE.d.weeks.some(function(w){return w.skill_id===s.id&&w.week===wk;});
    var st=skStreak(s.id);
    html+='<div class="sk"><div class="sk-h"><span class="sk-name">'+escT(s.name)+'</span><span style="display:flex;gap:6px;align-items:center">'+(st?'<span class="sk-streak">🔥 '+st+' v</span>':'')+'<button class="si-btn" style="width:26px;height:26px;font-size:12px" onclick="skDel('+s.id+')" title="Ta bort">✕</button></span></div>';
    html+='<button class="sk-week'+(on?' on':'')+'" onclick="skWeek('+s.id+')">'+(on?'✓ Tränat denna vecka':'Tränat/framsteg denna vecka?')+'</button>';
    LIFE.d.milestones.filter(function(m){return m.skill_id===s.id;}).forEach(function(m){
      html+='<button class="ms'+(m.done?' done':'')+'" onclick="skMs('+m.id+','+(m.done?'false':'true')+')"><span class="box">'+(m.done?'✓':'')+'</span><span class="t">'+escT(m.label)+'</span></button>';
    });
    html+='<button class="m-add" style="padding:8px 2px" onclick="skAddMs('+s.id+')">+ milstolpe</button></div>';
  });
  html+='<button class="btn" style="width:100%" onclick="skAdd()">+ Ny skill</button>';
  el.innerHTML=html;
}
async function skWeek(id){await call('life_week_toggle',{skill_id:id,week:mondayOf(new Date())});lifeLoad();}
async function skMs(id,done){await call('life_save',{table:'skill_milestones',row:{id:id,done:done}});lifeLoad();}
async function skAddMs(sid){var l=prompt('Milstolpe:');if(!l||!l.trim())return;await call('life_save',{table:'skill_milestones',row:{skill_id:sid,label:l.trim(),sort:99}});lifeLoad();}
async function skAdd(){var nn=prompt('Skill-namn:');if(!nn||!nn.trim())return;await call('life_save',{table:'skills',row:{name:nn.trim(),sort:99}});lifeLoad();}
async function skDel(id){if(!confirm('Ta bort denna skill (inkl. milstolpar + streak)?'))return;await call('life_del',{table:'skills',id:id});lifeLoad();}

// ── Content (veckologg + följare + backlog + playbook) ──
var PLATS=['LinkedIn','X','TikTok','YT','Instagram'];
function renderContent(){
  var el=document.getElementById('content-body');if(!el)return;
  if(!LIFE.d){el.innerHTML='<span class="muted">Laddar…</span>';return;}
  var today=new Date().toISOString().slice(0,10),wk=mondayOf(new Date());
  var html='<div class="sec-h" style="margin-top:2px">Veckologg</div>';
  html+='<div class="c-form">'+
    '<input id="cp-date" type="date" value="'+today+'">'+
    '<select id="cp-plat">'+PLATS.map(function(p){return '<option>'+p+'</option>';}).join('')+'</select>'+
    '<input id="cp-type" placeholder="Typ (klipp/inlägg…)">'+
    '<input id="cp-views" type="number" inputmode="numeric" placeholder="Views (valfri)">'+
    '<input id="cp-link" class="full" placeholder="Länk (valfri)">'+
    '<input id="cp-notes" class="full" placeholder="Anteckning (valfri)">'+
    '<button class="btn pri full" onclick="cpAdd()">Logga inlägg</button></div>';
  var tw=LIFE.d.posts.filter(function(p){return mondayOf(p.posted_on)===wk;}).length;
  html+='<div class="k-sub" style="margin-bottom:6px">Denna vecka: <b>'+tw+'/3</b></div>';
  LIFE.d.posts.slice(0,30).forEach(function(p){
    html+='<div class="c-post"><div class="cp-top"><span><span class="plat-pill">'+escT(p.platform)+'</span> '+escT(p.type||'')+'</span>'+
      '<span style="display:flex;gap:2px;align-items:center"><span class="muted" style="font-size:11px">'+p.posted_on+'</span>'+
      '<button class="m-del" onclick="cpEdit('+p.id+')" title="Uppdatera siffror">✎</button><button class="m-del" onclick="cpDel('+p.id+')">×</button></span></div>'+
      '<div class="cp-meta">'+(p.views!=null?n(p.views)+' views':'—')+(p.likes!=null?' · '+n(p.likes)+' likes':'')+(p.comments!=null?' · '+n(p.comments)+' komm.':'')+
      (p.link?' · <a href="'+escT(p.link)+'" target="_blank" rel="noopener">länk</a>':'')+(p.notes?'<br>'+escT(p.notes):'')+'</div></div>';
  });
  html+='<div class="sec-h">Följare (en siffra/vecka)</div><div class="card">';
  PLATS.forEach(function(p){
    var sn=LIFE.d.followers.filter(function(f){return f.platform===p;});
    var cur=sn.length?sn[sn.length-1].count:'';
    var pts='';
    if(sn.length>1){var vals=sn.map(function(x){return x.count;});var mx=Math.max.apply(null,vals),mn=Math.min.apply(null,vals);
      pts=vals.map(function(v,i){return (i/(vals.length-1)*100).toFixed(1)+','+(28-((v-mn)/Math.max(1,mx-mn))*24).toFixed(1);}).join(' ');}
    html+='<div class="fo-row"><span class="fo-name">'+p+'</span>'+
      '<span class="m-in"><input type="number" inputmode="numeric" id="fo-'+p+'" value="'+cur+'" placeholder="antal"></span>'+
      '<button class="si-btn" onclick="foSave(\''+p+'\')" title="Spara veckans siffra">✓</button>'+
      (pts?'<svg viewBox="0 0 100 30" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="var(--accent)" stroke-width="2"/></svg>':'<span style="flex:1"></span>')+'</div>';
  });
  html+='</div>';
  html+='<div class="sec-h">Idé-backlog</div><div class="card">'+
    '<div style="display:flex;gap:8px"><input id="idea-txt" placeholder="Ny idé…"><button class="btn pri" onclick="ideaAdd()">+</button></div>';
  LIFE.d.ideas.forEach(function(i2){html+='<div class="idea"><span>'+escT(i2.txt)+'</span><button class="m-del" onclick="ideaArch('+i2.id+')" title="Arkivera">✓</button></div>';});
  html+='</div>';
  html+='<div class="sec-h">Playbook</div><div class="card">'+
    '<details><summary style="cursor:pointer;font-weight:700;font-size:13.5px">📅 Veckorutin</summary><div class="mid" style="font-size:13px;line-height:1.7;margin-top:8px">Mån — build-in-public (LinkedIn, svenska)<br>Ons — perspektiv-inlägg<br>Tor — TikTok/Shorts-klipp (engelska)<br>Fre — win/fail<br>Varje dag — 10 min kommentering</div></details>'+
    '<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:700;font-size:13.5px">🚀 Growth-checklista (Fyndkollen)</summary><div class="mid" style="font-size:13px;line-height:1.7;margin-top:8px">• Svenska FB-grupper/forum med deklaration ("jag har byggt")<br>• 5 kalla DM/dag till aktiva flippare<br>• Free beta-framing<br>• Gratis värderingsverktyg som krok (analysera.html ✓)<br>• Referral-belöningar (finns: ?ref=NYCKEL ger 20 kr)</div></details>'+
    '<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:700;font-size:13.5px">🧱 Brand-pelare</summary><div class="mid" style="font-size:13px;line-height:1.7;margin-top:8px">Disciplin & transformation · Bygga underskattad · Learning obsession · Flytten till Stockholm</div></details></div>';
  el.innerHTML=html;
}
async function cpAdd(){
  var d=document.getElementById('cp-date').value;if(!d){alert('Datum saknas');return;}
  var row={posted_on:d,platform:document.getElementById('cp-plat').value,type:document.getElementById('cp-type').value||null,
    link:document.getElementById('cp-link').value||null,notes:document.getElementById('cp-notes').value||null};
  var v=document.getElementById('cp-views').value;if(v!=='')row.views=parseInt(v)||0;
  await call('life_save',{table:'content_posts',row:row});lifeLoad();
}
async function cpEdit(id){
  var p=LIFE.d.posts.find(function(x){return x.id===id;});if(!p)return;
  var v=prompt('Views:',p.views==null?'':p.views);if(v===null)return;
  var l=prompt('Likes:',p.likes==null?'':p.likes);if(l===null)return;
  var c=prompt('Kommentarer:',p.comments==null?'':p.comments);if(c===null)return;
  await call('life_save',{table:'content_posts',row:{id:id,views:parseInt(v)||0,likes:parseInt(l)||0,comments:parseInt(c)||0}});lifeLoad();
}
async function cpDel(id){if(!confirm('Ta bort inlägget ur loggen?'))return;await call('life_del',{table:'content_posts',id:id});lifeLoad();}
async function foSave(p){var v=parseInt(document.getElementById('fo-'+p).value);if(isNaN(v))return;await call('life_save',{table:'follower_snapshots',row:{platform:p,week:mondayOf(new Date()),count:v}});lifeLoad();}
async function ideaAdd(){var t2=document.getElementById('idea-txt').value.trim();if(!t2)return;await call('life_save',{table:'content_ideas',row:{txt:t2}});lifeLoad();}
async function ideaArch(id){await call('life_save',{table:'content_ideas',row:{id:id,archived:true}});lifeLoad();}

document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")login();});
</script>
